name: Agent OS image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: agent-os-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/akua-dev/agent-os

jobs:
  behavior:
    name: Exact-source behavior gate
    uses: ./.github/workflows/ci.yml

  provenance:
    if: github.event_name == 'push'
    name: Protected-main source provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Verify publication source
        env:
          GH_TOKEN: ${{ github.token }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -eu
          if [ "$GITHUB_REF" = refs/heads/main ]; then
            [ "$REF_PROTECTED" = true ] || { echo "::error::main is not reported protected"; exit 1; }
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
            [ "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA" ] || {
              echo "::error::release tag must point at the exact protected-main head"
              exit 1
            }
            gh api "repos/$GITHUB_REPOSITORY/branches/main/protection" >/dev/null
          else
            echo "::error::unsupported publication ref $GITHUB_REF"
            exit 1
          fi

  validate:
    name: Validate linux/amd64 and linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Prepare exact source bundle
        id: source
        run: |
          set -eu
          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            git clone --depth=1 --branch main https://github.com/akua-dev/agent-os.git "$RUNNER_TEMP/trusted-agent-os"
            AGENT_OS_SOURCE_ROOT="$RUNNER_TEMP/trusted-agent-os" \
              bin/agent-os-source-bundle.sh "$GITHUB_WORKSPACE/image" > "$RUNNER_TEMP/source-metadata"
          else
            bin/agent-os-source-bundle.sh > "$RUNNER_TEMP/source-metadata"
          fi
          cat "$RUNNER_TEMP/source-metadata" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build without publication credentials
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            AGENT_OS_SOURCE_COMMIT=${{ steps.source.outputs.commit }}
            AGENT_OS_SOURCE_TREE=${{ steps.source.outputs.tree }}
            AGENT_OS_SOURCE_BRANCH=${{ steps.source.outputs.branch }}
            AGENT_OS_SOURCE_ORIGIN=${{ steps.source.outputs.origin }}

  publish:
    if: github.event_name == 'push'
    needs: [behavior, provenance, validate]
    name: Publish linux/amd64 and linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Prepare exact source bundle
        id: source
        run: |
          set -eu
          bin/agent-os-source-bundle.sh > "$RUNNER_TEMP/source-metadata"
          cat "$RUNNER_TEMP/source-metadata" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and publish
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            AGENT_OS_SOURCE_COMMIT=${{ steps.source.outputs.commit }}
            AGENT_OS_SOURCE_TREE=${{ steps.source.outputs.tree }}
            AGENT_OS_SOURCE_BRANCH=${{ steps.source.outputs.branch }}
            AGENT_OS_SOURCE_ORIGIN=${{ steps.source.outputs.origin }}

      - name: Record published image digest
        run: |
          {
            echo '### Agent OS image'
            echo
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
