apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-os-firstmate
  namespace: agent-os-demo
---
# Local demo only. Production installations require a reviewed narrower role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-os-firstmate-local-demo
  labels:
    app.kubernetes.io/name: agent-os
    app.kubernetes.io/part-of: agent-os-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: agent-os-firstmate
    namespace: agent-os-demo

