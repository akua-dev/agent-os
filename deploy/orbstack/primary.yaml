apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-os-firstmate-home
  namespace: agent-os-demo
  labels:
    app.kubernetes.io/name: agent-os
    app.kubernetes.io/component: firstmate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agent-os-firstmate
  namespace: agent-os-demo
  labels:
    app.kubernetes.io/name: agent-os
    app.kubernetes.io/component: firstmate
spec:
  serviceName: agent-os-firstmate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-os
      app.kubernetes.io/component: firstmate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-os
        app.kubernetes.io/component: firstmate
    spec:
      serviceAccountName: agent-os-firstmate
      securityContext:
        fsGroup: 0
        runAsGroup: 0
        runAsUser: 0
      initContainers:
        - name: agent-os-init
          image: agent-os:dev
          imagePullPolicy: Never
          command:
            - /opt/agent-os/bin/agent-os-init.sh
          volumeMounts:
            - name: home
              mountPath: /persistent-agent
      containers:
        - name: firstmate
          image: agent-os:dev
          imagePullPolicy: Never
          env:
            - name: FM_HOME
              value: /home/agent
            - name: HOME
              value: /home/agent
            - name: AGENT_OS_TEST_PI_MODEL
              value: openai-codex/gpt-5.6-terra
            - name: AGENT_OS_TEST_PI_EFFORT
              value: low
          readinessProbe:
            exec:
              command:
                - herdr
                - status
                - --json
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: home
              mountPath: /home/agent
            - name: home
              mountPath: /usr/local
              subPath: usr-local
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: agent-os-firstmate-home
